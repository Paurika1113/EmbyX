name: Build APK

on:
  push:
    branches: [main]
  workflow_dispatch:

jobs:
  build-apk:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 20

      - name: Install PWABuilder CLI
        run: npm install -g @pwabuilder/cli

      - name: Generate APK
        run: |
          mkdir -p output
          npx @pwabuilder/cli -w ./en -a output -l
          
      - name: Upload APK
        uses: actions/upload-artifact@v4
        with:
          name: EmbyX-Android-APK
          path: output/*.apk
          if-no-files-found: warn
