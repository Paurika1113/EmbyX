name: Build APK

on:
  push:
    branches: [main]
  workflow_dispatch:

jobs:
  build-webview-apk:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Set up JDK 17
        uses: actions/setup-java@v4
        with:
          distribution: 'temurin'
          java-version: '17'

      - name: Setup Gradle
        uses: gradle/actions/setup-gradle@v3

      - name: Build APK with Gradle
        run: |
          cd android
          chmod +x gradlew 2>/dev/null || true
          # Use gradle wrapper or system gradle
          if [ -f gradlew ]; then
            ./gradlew assembleRelease
          else
            gradle assembleRelease
          fi

      - name: Upload APK
        uses: actions/upload-artifact@v4
        with:
          name: EmbyX-Android-APK
          path: android/app/build/outputs/apk/release/*.apk
          if-no-files-found: warn

  # Alternative build using Cordova (pwa2apk approach)
  build-cordova-apk:
    runs-on: ubuntu-latest
    needs: build-webview-apk
    if: always()
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Set up JDK 17
        uses: actions/setup-java@v4
        with:
          distribution: 'temurin'
          java-version: '17'

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 20

      - name: Build with Cordova
        run: |
          npm install -g cordova
          cordova create EmbyXApp com.embyx.webapp EmbyX --no-telemetry
          cd EmbyXApp
          cordova platform add android
          rm -rf www/*
          cp -r ../en/* www/
          # Configure preferences for fullscreen media playback
          cat >> config.xml << 'EOF'
    <preference name="Fullscreen" value="true" />
    <preference name="Orientation" value="default" />
    <preference name="DisallowOverscroll" value="true" />
    <preference name="WebViewBounce" value="false" />
EOF
          cordova build android --release

      - name: Upload Cordova APK
        uses: actions/upload-artifact@v4
        with:
          name: EmbyX-Cordova-APK
          path: EmbyXApp/platforms/android/app/build/outputs/apk/**/*.apk
          if-no-files-found: warn
